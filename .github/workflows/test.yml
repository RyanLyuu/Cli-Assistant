name: cangjieTest

on:
  push:
    branches: 
      - master
      - dev
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: download
        run: wget "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.0.5.tar.gz&objectKey=698acf46bd66ae22b62330b0" && tar -xzf cangjie-sdk-linux-x64-1.0.5.tar.gz
      - name: test
        run: . cangjie/envsetup.sh && cjc --version && cd repo_workspace && cjpm update && cjpm build && cjpm test
